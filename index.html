<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Glowmore Water Meter Report</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15806f">
<style>
:root{--green:#15806f;--green2:#e7f5f1;--head:#dcefd7;--grid:#d9e4e1;--text:#24313a;--muted:#6d7a82;--blue:#176be6;--danger:#d93025;}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f4f8f7;color:var(--text);font-size:15px}button,input,select{font:inherit} .top{background:var(--green);color:white;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:20}.top h1{font-size:20px;margin:0 0 3px}.top p{margin:0;font-size:13px;opacity:.9}.saveBtn{background:#fff;color:var(--green);border:0;border-radius:9px;padding:10px 16px;font-weight:700}.tabs{padding:10px;background:#e7f0ef;display:flex;gap:10px;position:sticky;top:66px;z-index:19}.tab{border:1px solid #cbdad6;background:white;color:var(--green);border-radius:9px;padding:10px 16px;font-weight:700}.tab.active{background:var(--green);color:white}.page{display:none;padding:14px}.page.active{display:block}.panel{background:white;border:1px solid #d4dfdc;border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px #0001}.toolbar{display:flex;gap:16px;align-items:end;flex-wrap:wrap}.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}.field input,.field select{border:1px solid #ccd8d5;border-radius:7px;padding:9px 10px;background:white;min-width:145px}.linkBtn{background:transparent;color:var(--green);border:0;font-weight:800;padding:10px}.primary{background:var(--green);color:white;border:0;border-radius:8px;padding:10px 14px;font-weight:800}.danger{background:#fde8e8;color:var(--danger);border:0;border-radius:8px;padding:8px 12px;font-weight:800}.hint{color:var(--muted);font-weight:600;margin-top:14px}.sheetWrap{background:white;border:1px solid #d4dfdc;border-radius:10px;padding:14px;overflow:auto;max-height:calc(100vh - 230px)}table{border-collapse:collapse;width:max-content;min-width:100%;background:white}.reportTitle{background:var(--green)!important;color:white!important;text-align:center!important;font-weight:900;font-size:17px;height:34px}th,td{border:1px solid var(--grid);padding:0;text-align:center;height:44px;min-width:78px}th{background:var(--head);font-weight:900}.freeze{position:sticky;left:0;z-index:5;background:#e8f6f3}.freeze2{position:sticky;left:92px;z-index:5;background:#e8f6f3}.dateCol{min-width:92px}.shiftCol{min-width:82px}.meterName{min-width:300px}.sub{font-size:13px}.usageCell{background:#f5fbff;font-weight:800}.rowToday td.freeze,.rowToday td.freeze2{background:#fff6d8}.rowToday{outline:2px solid #f2c94c}.cellInput{width:100%;height:43px;border:0;text-align:center;background:transparent;font-size:15px;padding:4px}.cellInput:focus{outline:2px solid var(--green);background:#fff}.summaryGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.card{border:1px solid #d4dfdc;border-radius:10px;padding:14px;background:white}.card h3{margin:0 0 10px}.metric{display:flex;justify-content:space-between;border-top:1px solid #edf2f1;padding:8px 0}.settingsRow{display:flex;gap:8px;margin-bottom:8px}.settingsRow input{flex:1;border:1px solid #ccd8d5;border-radius:7px;padding:10px}.small{font-size:12px;color:var(--muted)}@media(max-width:700px){.top h1{font-size:17px}.tabs{top:62px;overflow:auto}.tab{white-space:nowrap}.page{padding:10px}.sheetWrap{padding:8px}th,td{min-width:72px}.meterName{min-width:260px}}
</style>
</head>
<body>
<header class="top"><div><h1>GM Water Meter Report App</h1><p>Excel style monthly sheet · Day/Night · Before / After / Usage</p></div><button class="saveBtn" onclick="saveAll()">Save</button></header>
<nav class="tabs"><button class="tab active" onclick="showTab('input',this)">Daily Input</button><button class="tab" onclick="showTab('summary',this)">Summary & Chart</button><button class="tab" onclick="showTab('settings',this)">Settings</button></nav>
<main>
<section id="input" class="page active">
 <div class="panel"><div class="toolbar"><div class="field"><label>Recording Month</label><input type="month" id="monthPicker" onchange="changeMonth()"></div><button class="linkBtn" onclick="saveAll()">Save Current Month</button><button class="linkBtn" onclick="exportCSV()">Export CSV</button><button class="linkBtn" onclick="clearMonth()">Clear Month</button></div><div class="hint">Date and shift are auto-filled. Fill Before and After readings only. Usage = After − Before.</div></div>
 <div class="sheetWrap"><table id="meterTable"></table></div>
</section>
<section id="summary" class="page"><div class="panel"><div class="toolbar"><div class="field"><label>Summary Month</label><input type="month" id="summaryMonth" onchange="renderSummary()"></div></div></div><div class="summaryGrid" id="summaryCards"></div></section>
<section id="settings" class="page"><div class="panel"><h2>Meter Settings</h2><p class="small">Add / remove meter names here. The monthly sheet will follow this list.</p><div id="meterSettings"></div><button class="primary" onclick="addMeterSetting()">+ Add Meter</button><button class="linkBtn" onclick="resetDefaultMeters()">Reset Default</button></div></section>
</main>
<script>
const KEY='gm_water_meter_excel_v1';
let state=JSON.parse(localStorage.getItem(KEY)||'null')||{meters:['Main Water Meter','Second Main Water Meter','Car Park Water Meter 1','Car Park Water Meter 2'],data:{}};
function pad(n){return String(n).padStart(2,'0')}function ym(d=new Date()){return d.getFullYear()+'-'+pad(d.getMonth()+1)}function daysInMonth(m){let [y,mo]=m.split('-').map(Number);return new Date(y,mo,0).getDate()}function niceDate(m,day){let [y,mo]=m.split('-').map(Number);return new Date(y,mo-1,day).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}function rowKey(day,shift){return day+'_'+shift}function getRow(m,day,shift){state.data[m]??={};state.data[m][rowKey(day,shift)]??={};return state.data[m][rowKey(day,shift)]}
function saveAll(){localStorage.setItem(KEY,JSON.stringify(state));toast('Saved')}
function toast(t){let d=document.createElement('div');d.textContent=t;d.style.cssText='position:fixed;right:18px;bottom:18px;background:#111;color:#fff;padding:10px 14px;border-radius:8px;z-index:99';document.body.appendChild(d);setTimeout(()=>d.remove(),1200)}
function showTab(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active'); if(id==='summary')renderSummary(); if(id==='settings')renderSettings();}
function renderTable(){let m=document.getElementById('monthPicker').value;let table=document.getElementById('meterTable');let totalCols=2+state.meters.length*3;let html=`<tr><th class="reportTitle" colspan="${totalCols}">GM WATER METER REPORT - ${new Date(m+'-01').toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</th></tr><tr><th class="freeze dateCol" rowspan="2">Date</th><th class="freeze2 shiftCol" rowspan="2">Shift</th>`;state.meters.forEach(x=>html+=`<th class="meterName" colspan="3">${esc(x)}</th>`);html+='</tr><tr>';state.meters.forEach(()=>html+='<th class="sub">Before</th><th class="sub">After</th><th class="sub">Usage</th>');html+='</tr>';let today=new Date(), isThisMonth=ym(today)===m;
for(let d=1;d<=daysInMonth(m);d++){['Day','Night'].forEach(shift=>{let cls=isThisMonth&&today.getDate()===d?'rowToday':'';html+=`<tr class="${cls}"><td class="freeze dateCol">${niceDate(m,d)}</td><td class="freeze2 shiftCol">${shift}</td>`;state.meters.forEach((meter,mi)=>{let r=getRow(m,d,shift);let before=r[meter]?.before??'';let after=r[meter]?.after??'';let usage=calc(before,after);html+=`<td><input class="cellInput" inputmode="decimal" value="${before}" onchange="setVal('${m}',${d},'${shift}',${mi},'before',this.value)"></td><td><input class="cellInput" inputmode="decimal" value="${after}" onchange="setVal('${m}',${d},'${shift}',${mi},'after',this.value)"></td><td class="usageCell">${usage}</td>`});html+='</tr>'})}
table.innerHTML=html}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function calc(b,a){let x=parseFloat(b),y=parseFloat(a);if(isNaN(x)||isNaN(y))return '';return Math.max(0,y-x).toLocaleString(undefined,{maximumFractionDigits:2})}
function setVal(m,d,shift,mi,field,val){let meter=state.meters[mi];let r=getRow(m,d,shift);r[meter]??={};r[meter][field]=val;saveAll();renderTable()}
function changeMonth(){document.getElementById('summaryMonth').value=document.getElementById('monthPicker').value;renderTable()}
function meterUsage(month,meter){let arr=[];for(let d=1;d<=daysInMonth(month);d++)['Day','Night'].forEach(s=>{let rec=getRow(month,d,s)[meter]||{};let b=parseFloat(rec.before),a=parseFloat(rec.after);if(!isNaN(b)&&!isNaN(a)&&a>=b)arr.push(a-b)});return arr}
function renderSummary(){let m=document.getElementById('summaryMonth').value||document.getElementById('monthPicker').value;document.getElementById('summaryMonth').value=m;let out='';state.meters.forEach(meter=>{let arr=meterUsage(m,meter);let total=arr.reduce((a,b)=>a+b,0);let avg=arr.length?total/arr.length:0;out+=`<div class="card"><h3>${esc(meter)}</h3><div class="metric"><span>Total Usage</span><b>${total.toFixed(2)}</b></div><div class="metric"><span>Average / Shift</span><b>${avg.toFixed(2)}</b></div><div class="metric"><span>Highest</span><b>${arr.length?Math.max(...arr).toFixed(2):'0.00'}</b></div><div class="metric"><span>Lowest</span><b>${arr.length?Math.min(...arr).toFixed(2):'0.00'}</b></div></div>`});document.getElementById('summaryCards').innerHTML=out}
function renderSettings(){document.getElementById('meterSettings').innerHTML=state.meters.map((m,i)=>`<div class="settingsRow"><input value="${esc(m)}" onchange="renameMeter(${i},this.value)"><button class="danger" onclick="removeMeter(${i})">Delete</button></div>`).join('')}
function renameMeter(i,v){if(!v.trim())return;state.meters[i]=v.trim();saveAll();renderTable();renderSettings()}function removeMeter(i){if(!confirm('Delete this meter?'))return;state.meters.splice(i,1);saveAll();renderTable();renderSettings()}function addMeterSetting(){state.meters.push('New Water Meter');saveAll();renderSettings();renderTable()}function resetDefaultMeters(){state.meters=['Main Water Meter','Second Main Water Meter','Car Park Water Meter 1','Car Park Water Meter 2'];saveAll();renderSettings();renderTable()}
function clearMonth(){let m=document.getElementById('monthPicker').value;if(confirm('Clear all data for '+m+'?')){delete state.data[m];saveAll();renderTable()}}
function exportCSV(){let m=document.getElementById('monthPicker').value;let rows=[];rows.push(['GM WATER METER REPORT - '+new Date(m+'-01').toLocaleDateString('en-GB',{month:'long',year:'numeric'})]);let h=['Date','Shift'];state.meters.forEach(x=>h.push(x+' Before',x+' After',x+' Usage'));rows.push(h);for(let d=1;d<=daysInMonth(m);d++)['Day','Night'].forEach(s=>{let row=[niceDate(m,d),s];state.meters.forEach(meter=>{let rec=getRow(m,d,s)[meter]||{};row.push(rec.before||'',rec.after||'',calc(rec.before,rec.after)||'')});rows.push(row)});let csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');let blob=new Blob([csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='GM_WATER_METER_REPORT_'+m+'.csv';a.click()}
function init(){document.getElementById('monthPicker').value=ym();document.getElementById('summaryMonth').value=ym();renderTable();renderSettings();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})}init();
</script>
</body></html>
