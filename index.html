<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GM Water Meter Report</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#1f4e79" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>GM WATER METER REPORT</h1>
      <p>Monthly water meter reading sheet</p>
    </div>
    <button id="exportCsv" class="primary">Export CSV</button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="sheet">Monthly Sheet</button>
    <button class="tab" data-tab="summary">Summary</button>
    <button class="tab" data-tab="validation">Validation</button>
    <button class="tab" data-tab="settings">Settings</button>
  </nav>

  <main>
    <section id="sheet" class="panel active">
      <div class="toolbar">
        <label>Month <input id="monthPicker" type="month"></label>
        <button id="todayBtn">This Month</button>
        <button id="clearMonth" class="danger">Clear Month</button>
      </div>
      <div class="note">Only key in meter reading. Usage is calculated automatically from previous reading.</div>
      <div class="tableWrap"><table id="sheetTable"></table></div>
    </section>

    <section id="summary" class="panel">
      <div class="toolbar"><label>Month <input id="summaryMonth" type="month"></label></div>
      <div class="tableWrap"><table id="summaryTable"></table></div>
    </section>

    <section id="validation" class="panel">
      <div class="toolbar"><label>Month <input id="validationMonth" type="month"></label></div>
      <div class="tableWrap"><table id="validationTable"></table></div>
    </section>

    <section id="settings" class="panel">
      <div class="settingsBox">
        <h2>Water Meter Settings</h2>
        <div class="addRow">
          <input id="newMeterName" placeholder="New meter name, e.g. Main Meter" />
          <button id="addMeter" class="primary">Add Meter</button>
        </div>
        <div id="meterList"></div>
        <p class="hint">Default meters can be renamed or deleted. The monthly sheet will update automatically.</p>
      </div>
    </section>
  </main>

  <script src="storage.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
